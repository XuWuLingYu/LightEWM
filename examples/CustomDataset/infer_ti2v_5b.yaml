task: infer

runner:
  class_path: lightewm.runner.wan.wan_infer.WanInferRunner
  params:
    output_dir: ./outputs/wan_ti2v_5b_infer
    fps: 16
    quality: 5
    seed: 0
    infer_kwargs:
      negative_prompt: ""
      height: 480
      width: 832
      num_frames: 81
      cfg_scale: 1.0
      num_inference_steps: 50
      tiled: true

model:
  class_path: lightewm.model.wan.pipeline_ti2v_5b.WanTI2V5BPipeline
  params:
    device: cuda
    torch_dtype: bfloat16
    tokenizer_path: checkpoints/Wan2.2-TI2V-5B/google/umt5-xxl
    model_paths:
      - - checkpoints/Wan2.2-TI2V-5B/diffusion_pytorch_model-00001-of-00003.safetensors
        - checkpoints/Wan2.2-TI2V-5B/diffusion_pytorch_model-00002-of-00003.safetensors
        - checkpoints/Wan2.2-TI2V-5B/diffusion_pytorch_model-00003-of-00003.safetensors
      - checkpoints/Wan2.2-TI2V-5B/models_t5_umt5-xxl-enc-bf16.pth
      - checkpoints/Wan2.2-TI2V-5B/Wan2.2_VAE.pth

dataset:
  class_path: lightewm.dataset.video_infer.VideoInferenceDataset
  params:
    base_path: data/your_dataset
    metadata_path: data/your_dataset/metadata.csv
    video_key: video
    prompt_key: prompt
