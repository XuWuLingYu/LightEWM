task: eval

runner:
  class_path: lightewm.runner.fastwam.FastWAMRunner
  params:
    fastwam_root: lightewm/vendor/fastwam
    output_dir: ./logs/eval/LIBERO-FASTWAM
    num_processes: 8

    fastwam_task: libero_joint_2cam224_1e-4
    fastwam_model: fastwam_joint
    fastwam_data: libero_2cam

    checkpoint_path: null
    dataset_stats_path: null

    num_gpus: 8
    max_tasks_per_gpu: 2
    num_trials: 10
    task_suite_names:
      - libero_10
      - libero_goal
      - libero_spatial
      - libero_object

    hydra_overrides:
      - model.redirect_common_files=false
      - EVALUATION.replan_steps=10
      - EVALUATION.num_inference_steps=10
      - EVALUATION.text_cfg_scale=1.0
      - EVALUATION.visualize_future_video=false
