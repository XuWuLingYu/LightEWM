task: train

runner:
  class_path: lightewm.runner.causal_forcing.CausalForcingRunner
  params:
    output_path: ./logs/train/LIBERO-Causal
    model_root: checkpoints
    num_processes: 8
    master_port: 29577
    no_visualize: true
    causal_config_overrides:
      wandb_project: LightEWM-LIBERO-Causal
      height: 224
      width: 224
      num_frames: 49
      num_workers: 8
      variable_num_frames_train: false
      max_training_video_frames: 49
      model_kwargs:
        timestep_shift: 5.0
        seq_len: 1029

dataset:
  class_path: lightewm.dataset.causal_forcing.CausalForcingJsonlAdapter
  params:
    base_path: data/libero_i2v_train
    metadata_path: data/libero_i2v_train/metadata_dense_prompt.csv
    video_key: video
    prompt_key: prompt
    fallback_prompt_keys: [dense_prompt, sparse_prompt]
