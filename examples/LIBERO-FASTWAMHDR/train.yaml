task: train

runner:
  class_path: lightewm.runner.fastwam.FastWAMRunner
  params:
    fastwam_root: lightewm/vendor/fastwam
    output_path: ./logs/train/LIBERO-FASTWAMHDR
    num_processes: 8
    zero_stage: 1

    # FastWAM-native Hydra choices.
    fastwam_task: libero_joint_2cam224_1e-4
    fastwam_model: fastwam_joint
    fastwam_data: libero_2cam

    # Raw Wan2.2-5B plus FastWAM action backbone.
    model_id: Wan-AI/Wan2.2-TI2V-5B
    tokenizer_model_id: Wan-AI/Wan2.1-T2V-1.3B
    video_dit_pretrained_path: checkpoints/Wan2.2-5B-Robot/checkpoint.safetensors
    action_dit_pretrained_path: checkpoints/ActionDiT_linear_interp_Wan22Robot_alphascale_1024hdim.pt

    # FastWAM official LIBERO LeRobot-format data.
    dataset_dirs:
      - data/libero_mujoco3.3.2/libero_spatial_no_noops_lerobot
      - data/libero_mujoco3.3.2/libero_object_no_noops_lerobot
      - data/libero_mujoco3.3.2/libero_goal_no_noops_lerobot
      - data/libero_mujoco3.3.2/libero_10_no_noops_lerobot
    text_embedding_cache_dir: data/text_embeds_cache/libero

    # Parameters intentionally match FastWAM configs/task/libero_joint_2cam224_1e-4.yaml.
    hydra_overrides:
      - batch_size=16
      - num_workers=4
      - model.redirect_common_files=false
      - model.mot_checkpoint_mixed_attn=false
      - lr_scheduler_type=cosine
      - learning_rate=1e-4
      - num_epochs=10
      - max_steps=null
      - log_every=10
      - save_every=1000
      - eval_every=200
      - +smoke_eval_step=5
      - gradient_accumulation_steps=1
      - weight_decay=1e-2
      - mixed_precision=bf16
      - max_grad_norm=1.0
      - wandb.enabled=true
      - wandb.project=LightEWM-LIBERO-FASTWAMHDR
      - wandb.name=libero-joint-2cam224-fastwamhdr
      - model.action_attend_video=local_clean_first
      - +data.train.hdr_enabled=true
      - +data.train.hdr_local_rgb_frames=9
      - +data.train.hdr_tree_rgb_frames=4
      - +data.train.hdr_total_rgb_frames=13
      - +data.train.hdr_tree_sampling=uniform_local_start_to_end
