task: train

runner:
  class_path: lightewm.runner.wan.wan_training.WanTrainRunner
  params:
    output_path: ./logs/train/Wan2.2-TI2V-5B-Libero
    height: 480
    width: 832
    dataset_repeat: 100
    trainable_models: dit
    extra_inputs: input_image
    learning_rate: 1.0e-5
    batch_size: 1
    num_epochs: 999
    save_steps: 5000
    remove_prefix_in_ckpt: pipe.dit.
    use_gradient_checkpointing: true
    wandb_enabled: true
    wandb_project: LightEWM
    wandb_run_name: Wan2.2-TI2V-5B-Libero
    wandb_mode: online
    wandb_log_every: 5
    validation_every_steps: 2000
    validation_extra_steps: [10]
    validation_num_samples: 3
    validation_fps: 10
    validation_quality: 5
    validation_seed_base: 0
    validation_input_image_resize_mode: letterbox
    validation_infer_kwargs:
      negative_prompt: ""
      height: 480
      width: 832
      num_frames: 49
      cfg_scale: 1.0
      num_inference_steps: 50
      tiled: true
    task: sft:train

model:
  class_path: lightewm.model.wan.pipeline_ti2v_5b.WanTI2V5BPipeline
  params:
    device: cuda
    torch_dtype: bfloat16
    tokenizer_path: checkpoints/Wan2.2-TI2V-5B/google/umt5-xxl
    model_paths:
      - - checkpoints/Wan2.2-TI2V-5B/diffusion_pytorch_model-00001-of-00003.safetensors
        - checkpoints/Wan2.2-TI2V-5B/diffusion_pytorch_model-00002-of-00003.safetensors
        - checkpoints/Wan2.2-TI2V-5B/diffusion_pytorch_model-00003-of-00003.safetensors
      - checkpoints/Wan2.2-TI2V-5B/models_t5_umt5-xxl-enc-bf16.pth
      - checkpoints/Wan2.2-TI2V-5B/Wan2.2_VAE.pth

dataset:
  class_path: lightewm.dataset.unified_dataset.UnifiedDataset
  params:
    dataset_base_path: ./data/libero_i2v_train/latent_cache_ti2v_5b
    dataset_metadata_path: null

runtime:
  params:
    gradient_accumulation_steps: 1

validation_dataset:
  class_path: lightewm.dataset.libero_infer.LiberoInferenceDataset
  params:
    base_path: data/libero_i2v_train
    metadata_path: data/libero_i2v_train/metadata_dense_prompt.csv
    video_key: video
    prompt_key: prompt
    demo_id_key: demo_id
    camera_key_col: camera_key
