task: train

runner:
  class_path: lightewm.runner.causal_forcing.CausalForcingRunner
  params:
    output_path: ./logs/train/CustomDataset-Causal
    backend_root: ../HiDiT/Causal-Forcing
    official_config_path: ../HiDiT/Causal-Forcing/configs/ar_diffusion_tf_framewise_wan22_ti2v_5b_maze.yaml
    model_root: checkpoints
    num_processes: 8
    master_port: 29582
    no_visualize: true
    causal_config_overrides:
      wandb_project: LightEWM-CustomDataset-Causal
      height: 224
      width: 224
      num_frames: 49
      num_workers: 8
      variable_num_frames_train: false
      max_training_video_frames: 49
      model_kwargs:
        timestep_shift: 5.0
        seq_len: 1029

dataset:
  class_path: lightewm.dataset.causal_forcing.CausalForcingJsonlAdapter
  params:
    base_path: data/your_dataset
    metadata_path: data/your_dataset/metadata.csv
    video_key: video
    prompt_key: prompt
