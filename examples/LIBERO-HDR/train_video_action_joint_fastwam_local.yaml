task: train

runner:
  class_path: lightewm.runner.causal_forcing.CausalForcingRunner
  params:
    output_path: ./logs/train/LIBERO-HDR-VideoActionJoint-FastWAMLocal
    backend_root: lightewm/vendor/causal_forcing
    official_config_path: lightewm/vendor/causal_forcing/configs/maze_recursive_7_11_17_26_40_50_all_condition_push_v4.yaml
    model_root: checkpoints
    num_processes: 8
    master_port: 29587
    no_visualize: true
    causal_config_overrides:
      wandb_project: LightEWM-LIBERO-HDR-VideoActionJoint
      wandb_name: hdr-tree-fastwam-local-joint-resume12k-b8-acc2-warm500
      train_timer: true
      train_timer_first_steps: 5
      train_timer_interval: 10
      train_timer_sync_cuda: true
      height: 224
      width: 448
      num_frames: 33
      batch_size: 8
      total_batch_size: 128
      num_workers: 0
      log_iters: 400
      # Closed-loop simulator eval is intentionally separate from training-time val.
      # Keep it disabled here because it is much slower than open-loop action val.
      libero_eval_interval: 0
      open_loop_val_interval: 200
      open_loop_val_num_batches: 1
      open_loop_val_batch_size: 1
      open_loop_val_joint_steps: 10
      open_loop_val_num_workers: 0
      libero_eval_script: scripts/eval_libero_hdr_video_action_joint_suites.py
      libero_eval_metadata: data/libero_i2v_train/metadata_dense_prompt_hdr_video_action_joint_fastwam_local.csv
      libero_eval_suites: [libero_spatial, libero_object, libero_goal, libero_10]
      libero_eval_tasks_per_suite: 1
      libero_eval_episodes_per_task: 1
      libero_eval_joint_steps: 10
      libero_eval_tree_fixed_denoise_steps: 5
      libero_eval_tree_sampling_steps: 50
      libero_eval_execute_steps: 8
      libero_eval_timeout_steps: 600
      libero_eval_device: cuda:0
      sharding_strategy: full
      variable_num_frames_train: false
      max_training_video_frames: 33
      use_preencoded_cache: true
      generator_ckpt: logs/LIBERO-HDR_train_video_action_joint_fastwam_local/20260621_174528/checkpoint_model_000400/model.pt
      vertical_use_representative_rope: true
      action_use_video_latent_cache: false
      vertical_leaf_frames: 9
      vertical_level_sizes: [1, 2, 4, 8, 9]
      vertical_step_budgets: [7, 11, 18, 31, 50]
      action_training: true
      video_action_joint_training: true
      action_video_fsdp: true
      generator_fsdp_wrap_strategy: none
      joint_drop_tree_tokens: false
      joint_tree_num_levels: 3
      joint_tree_from_hdf5: true
      joint_tree_camera_key: [agentview_rgb, eye_in_hand_rgb]
      joint_window_frames: 32
      joint_source_fps: 16.0
      joint_target_fps: 16.0
      joint_video_frame_stride: 4
      joint_include_terminal_video_frame: true
      joint_camera_key: [agentview_rgb, eye_in_hand_rgb]
      joint_norm_clip: 5.0
      joint_local_video_tokens: 2
      joint_action_attend_video: local_start
      joint_tree_video_loss_weight: 1.0
      joint_local_video_loss_weight: 1.0
      joint_action_loss_weight: 1.0
      action_train_shift: 5.0
      action_infer_shift: 5.0
      lr: 4.0e-5
      beta1: 0.9
      beta2: 0.95
      max_grad_norm: 1.0
      lr_schedule: linear_warmup_cosine
      lr_warmup_steps: 500
      lr_total_steps: 20000
      lr_min_ratio: 0.01
      max_train_steps: 20000
      action_backbone_lr: 4.0e-5
      action_new_lr: 4.0e-5
      actions_per_leaf: 32
      action_stats_path: data/libero_i2v_train/hdr_video_action_joint_fastwam_local_action_stats.json
      joint_proprio_stats_path: data/libero_i2v_train/hdr_video_action_joint_fastwam_local_proprio_stats.json
      action_dit_init_from_video: true
      action_dit_alpha_scaling: true
      action_dit_ckpt: logs/LIBERO-HDR_train_video_action_joint_fastwam_local/20260621_174528/checkpoint_model_000400/model.pt
      action_dit_pretrained_path: null
      action_dit_config:
        action_dim: 7
        hidden_dim: 1024
        ffn_dim: 4096
        freq_dim: 256
        eps: 1.0e-6
        actions_per_leaf: 32
        action_attend_video: all
        proprio_dim: 8
        use_gradient_checkpointing: true
      model_kwargs:
        timestep_shift: 1.0
        seq_len: 2352

dataset:
  class_path: lightewm.dataset.causal_forcing.CausalForcingJsonlAdapter
  params:
    base_path: data/libero_i2v_train
    metadata_path: data/libero_i2v_train/metadata_preencoded_hdr_video_action_joint_fastwam_local.jsonl
    video_key: video
    prompt_key: dense_prompt
    fallback_prompt_keys: [prompt, sparse_prompt]
    filter_key: camera_key
    filter_value: agentview_rgb
    proprio_stats_path: data/libero_i2v_train/hdr_video_action_joint_fastwam_local_proprio_stats.json
