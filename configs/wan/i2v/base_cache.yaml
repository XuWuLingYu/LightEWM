task: cache

runner:
  class_path: lightewm.runner.wan.wan_i2v_pipeline.WanCacheRunner
  params:
    output_path: ./data/libero_i2v_train/latent_cache
    height: 480
    width: 832
    dataset_repeat: 1
    trainable_models: dit
    extra_inputs: input_image
    fps: 16
    resize_mode: letterbox
    context_window_short_video_mode: drop
    context_window_stride: 81
    context_window_tail_align: true
    context_window_wait_timeout: 7200
    task: sft:data_process

model:
  class_path: lightewm.model.wan.pipeline.WanVideoPipeline
  params:
    device: cuda
    torch_dtype: bfloat16
    model_paths:
      - checkpoints/Wan2.1-I2V-1.3B/diffusion_pytorch_model.safetensors
      - checkpoints/Wan2.1-I2V-1.3B/models_t5_umt5-xxl-enc-bf16.pth
      - checkpoints/Wan2.1-I2V-1.3B/Wan2.1_VAE.pth
      - checkpoints/Wan2.1-I2V-1.3B/models_clip_open-clip-xlm-roberta-large-vit-huge-14.pth

dataset:
  class_path: lightewm.dataset.unified_dataset.UnifiedDataset
  params:
    dataset_base_path: data/your_dataset
    dataset_metadata_path: data/your_dataset/metadata.csv

runtime:
  params:
    gradient_accumulation_steps: 1
